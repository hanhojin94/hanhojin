  <style>
    :root {
      --bg-main: #000000;
      --bg-sub: #111111;
      --text-main: #ffffff;
      --text-sub: #a1a1a6;
      --accent: #ffffff;
      --border: #222222;
      --font-main: 'Pretendard', -apple-system, sans-serif;
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    body { margin: 0; font-family: var(--font-main); background-color: var(--bg-main); color: var(--text-main); overflow-x: hidden; letter-spacing: -0.01em; }

    body::before {
      content: ""; position: fixed; inset: 0;
      background: radial-gradient(circle at 15% 15%, rgba(40, 40, 40, 0.3) 0%, transparent 60%),
                  radial-gradient(circle at 85% 85%, rgba(20, 20, 20, 0.2) 0%, transparent 60%);
      z-index: -1;
    }

    .container { max-width: 1400px; margin: 0 auto; padding: 60px 20px; }

    header { margin-bottom: 80px; text-align: center; }
    .tagline { color: var(--text-sub); font-size: 14px; text-transform: uppercase; letter-spacing: 0.2em; font-weight: 600; }
    h1 { font-size: 42px; font-weight: 800; margin: 15px 0 0; color: var(--accent); }

    .featured-section { margin-bottom: 80px; position: relative; overflow: hidden; padding: 10px; }
    .featured-track { display: flex; transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1); gap: 20px; }
    .featured-item { 
      flex: 0 0 100%; 
      position: relative; 
      aspect-ratio: 16 / 9; 
      border-radius: 12px; 
      overflow: hidden; 
      cursor: pointer; 
      background: #000; 
      border: 1px solid var(--border);
    }
    
    @media (min-width: 1024px) {
      .featured-item { flex: 0 0 80%; }
    }

    .featured-item img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: 0.6s; }
    .featured-item:hover img { opacity: 1; transform: scale(1.02); }
    .featured-overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 40px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); }
    .featured-overlay h2 { color: #fff; margin: 0; font-size: 24px; font-weight: 700; }

    .filters { display: flex; gap: 12px; margin-bottom: 50px; justify-content: center; flex-wrap: wrap; overflow-x: auto; padding-bottom: 10px; }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn { background-color: var(--bg-sub); border: 1px solid var(--border); color: var(--text-main); cursor: pointer; font-size: 15px; transition: 0.3s; padding: 10px 22px; border-radius: 30px; white-space: nowrap; }
    .filter-btn.active { background-color: var(--accent); color: #000; font-weight: 600; border-color: var(--accent); }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
    .video-card { cursor: pointer; transition: 0.4s; background: var(--bg-sub); border-radius: 16px; overflow: hidden; border: 1px solid var(--border); }
    .video-card:hover { transform: translateY(-8px); border-color: #444; }
    .thumb-wrap { width: 100%; aspect-ratio: 16/9; overflow: hidden; position: relative; }
    .video-card .thumb { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; transition: 0.5s; }
    .video-card:hover .thumb { opacity: 1; }
    .card-info { padding: 20px; }
    .card-cat { font-size: 11px; color: var(--text-sub); text-transform: uppercase; font-weight: 600; margin-bottom: 6px; }
    .card-title { font-weight: 700; font-size: 18px; margin: 0; color: var(--text-main); line-height: 1.4; }

    footer { background-color: var(--bg-sub); padding: 80px 20px; border-top: 1px solid var(--border); text-align: center; margin-top: 100px; }
    .footer-heading { font-size: 26px; font-weight: 800; margin-bottom: 40px; color: var(--accent); }
    .contact-container { display: flex; justify-content: center; gap: 50px; flex-wrap: wrap; }
    .contact-box { display: flex; flex-direction: column; gap: 10px; }
    .contact-label { font-size: 12px; color: var(--text-sub); text-transform: uppercase; font-weight: 700; letter-spacing: 0.15em; }
    .contact-value { font-size: 19px; color: var(--text-main); text-decoration: none; font-weight: 600; border-bottom: 1px solid transparent; transition: 0.3s; }
    .contact-value:hover { border-bottom: 1px solid #fff; }

    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; backdrop-filter: blur(15px); }
    .modal.open { display: flex; }
    .modal-content { width: 100%; max-width: 1200px; display: flex; gap: 0; position: relative; flex-wrap: wrap; background: #000; border-radius: 20px; overflow: hidden; border: 1px solid #333; max-height: 90vh; overflow-y: auto; }
    .player-container { flex: 1; min-width: 60%; aspect-ratio: 16 / 9; background: #000; }
    .player-container iframe { width: 100%; height: 100%; border: none; }
    .info-container { flex: 0 0 350px; background: var(--bg-sub); padding: 40px; display: flex; flex-direction: column; gap: 20px; border-left: 1px solid var(--border); }
    .modal-title { margin: 0; font-size: 26px; font-weight: 800; border-bottom: 2px solid var(--border); padding-bottom: 15px; color: var(--accent); }
    .info-item { display: flex; flex-direction: column; gap: 4px; }
    .info-label { font-size: 11px; color: var(--text-sub); text-transform: uppercase; font-weight: 700; }
    .info-value { font-size: 15px; font-weight: 600; }
    .info-desc { margin-top: 10px; line-height: 1.7; font-size: 14px; color: #ccc; white-space: pre-line; background: #000; padding: 15px; border-radius: 10px; border: 1px solid var(--border); }
    .modal-close { position: absolute; top: 20px; right: 20px; color: #fff; background: rgba(0,0,0,0.5); border: 1px solid var(--border); font-size: 20px; cursor: pointer; width: 36px; height: 36px; border-radius: 50%; z-index: 10; display: flex; align-items: center; justify-content: center; }

    @media (max-width: 1024px) {

    }

      </div>
    `).join('');
  }

  function startRolling() {
    const items = document.querySelectorAll('.featured-item');
    if (items.length <= 1) return;
    rollingInterval = setInterval(() => {
      currentIndex = (currentIndex + 1) % items.length;
      const isMobile = window.innerWidth < 1024;
      featuredTrack.style.transform = `translateX(-${currentIndex * (isMobile ? 105 : 82.2)}%)`;
    }, 5000);
  }

  function filterVideos(btn, cat) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderContent(cat);
    currentIndex = 0;
    featuredTrack.style.transform = `translateX(0)`;
  }

  function openModal(id) {
    clearInterval(rollingInterval);
    const video = VIDEO_DATA.find(v => v.youtubeId === id);
    const origin = window.location.origin === "null" ? "*" : window.location.origin;
    playerWrap.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&origin=${encodeURIComponent(origin)}" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
    
    infoContainer.innerHTML = `
      <div class="modal-title">${video.title}</div>
      <div class="info-item"><span class="info-label">Client</span><span class="info-value">${video.client}</span></div>
      <div class="info-item"><span class="info-label">Type</span><span class="info-value">${video.type}</span></div>
      <div class="info-item"><span class="info-label">Role</span><span class="info-value">${video.role}</span></div>
      <div class="info-item"><span class="info-label">Year</span><span class="info-value">${video.year}</span></div>
      <div class="info-desc">${video.desc}</div>
    `;
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    modal.classList.remove('open');
    playerWrap.innerHTML = '';
    document.body.style.overflow = 'auto';
    startRolling();
  }

  init();
</script>
</body>
</html>
